name: CI — Build & Lint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ── Public Site (Astro) ───────────────────────────────────────────────────
  build-site:
    name: Astro Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/site
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/site/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run lint
        continue-on-error: false

  # ── Admin PWA (React / Vite) ──────────────────────────────────────────────
  build-admin:
    name: Admin PWA Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/admin/package-lock.json
      - run: npm ci
      - run: npm run build

  # ── .NET API ──────────────────────────────────────────────────────────────
  build-api:
    name: .NET Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - run: dotnet restore PersonalSite.slnx
      - run: dotnet build PersonalSite.slnx --no-restore --configuration Release
      - run: dotnet test PersonalSite.slnx --no-build --configuration Release --verbosity normal

  # ── Lighthouse CI ─────────────────────────────────────────────────────────
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: [build-site]
    defaults:
      run:
        working-directory: src/site
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site (static output for Lighthouse)
        run: npm run build
        env:
          # Placeholder values so build doesn't fail when Strapi is unreachable in CI.
          # The Strapi adapter returns empty arrays gracefully on fetch failure.
          PUBLIC_API_URL: "http://localhost:5000"
          STRAPI_URL: "http://localhost:1337"
          STRAPI_API_TOKEN: "ci-placeholder"

      - name: Run Lighthouse CI
        run: npx @lhci/cli@0.14.x autorun
        working-directory: .
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
