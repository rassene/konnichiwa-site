name: Deploy — Admin PWA

on:
  push:
    branches: [main]
    paths:
      - "src/admin/**"
      - ".github/workflows/admin-pwa.yml"
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy Admin PWA to Azure Static Web Apps
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/admin
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Admin PWA
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ADMIN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "src/admin"
          output_location: "dist"
          skip_app_build: true
